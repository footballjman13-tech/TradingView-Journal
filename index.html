<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Journal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Responsive height: shorter on mobile (110px), taller on PC (150px) */
        .day-card { 
            min-height: 110px; 
            transition: all 0.2s; 
            border: 1px solid #334155; 
            position: relative; 
            overflow: visible !important; 
        }
        @media (min-width: 1024px) {
            .day-card { min-height: 150px; }
        }

        .bg-profit { background-color: #22c55e !important; color: white; border-color: #4ade80; }
        .bg-loss { background-color: #ef4444 !important; color: white; border-color: #f87171; }
        .bg-breakeven { background-color: #eab308 !important; color: white; border-color: #facc15; }

        /* Pop-up Styling */
        .details-pop {
            display: none; position: absolute; z-index: 100; bottom: 105%; left: 50%;
            transform: translateX(-50%); width: 220px; padding: 12px;
            background: #0f172a; border: 2px solid #3b82f6; border-radius: 8px;
            font-size: 12px; color: white; text-align: center; pointer-events: none;
            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
        }
        .day-card:hover .details-pop, .day-card:active .details-pop { display: block; }
    </style>
</head>
<body class="bg-slate-900 text-white font-sans p-4 md:p-10">

    <div class="max-w-screen-2xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-end mb-10 border-b border-slate-700 pb-8">
            <div class="mb-6 md:mb-0">
                <h1 id="monthTitle" class="text-5xl font-black text-blue-400 uppercase tracking-tighter italic">MONTH</h1>
                <p class="text-slate-400 text-base mt-2">Trading Performance Tracker</p>
            </div>
            <div class="flex gap-6 md:gap-12 text-right">
                <div class="border-r border-slate-700 pr-6 md:pr-12">
                    <p class="text-[10px] text-slate-500 uppercase font-bold tracking-widest mb-1">Win Rate</p>
                    <p id="winRate" class="text-4xl font-mono text-yellow-400">0%</p>
                </div>
                <div class="border-r border-slate-700 pr-6 md:pr-12">
                    <p class="text-[10px] text-slate-500 uppercase font-bold tracking-widest mb-1">Total Trades</p>
                    <p id="totalTrades" class="text-4xl font-mono text-blue-400">0</p>
                </div>
                <div>
                    <p class="text-[10px] text-slate-500 uppercase font-bold tracking-widest mb-1">Net PNL</p>
                    <p id="totalPNL" class="text-4xl font-mono text-green-400">$0.00</p>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 xl:grid-cols-5 gap-10">
            
            <div class="xl:col-span-1 space-y-6">
                <div class="bg-slate-800 p-8 rounded-2xl shadow-2xl border border-slate-700">
                    <h2 class="text-xl font-bold mb-6 text-blue-300 uppercase italic tracking-wider">Log Session</h2>
                    <form id="tradeForm" class="space-y-5">
                        <div>
                            <label class="block text-[10px] mb-2 text-slate-400 uppercase font-bold">Date</label>
                            <input type="date" id="dateInput" required class="w-full bg-slate-700 border-none rounded-lg p-3 focus:ring-2 focus:ring-blue-500 text-white">
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-[10px] mb-2 text-slate-400 uppercase font-bold">PNL ($)</label>
                                <input type="number" id="pnlInput" placeholder="0.00" step="0.01" required class="w-full bg-slate-700 border-none rounded-lg p-3 text-white">
                            </div>
                            <div>
                                <label class="block text-[10px] mb-2 text-slate-400 uppercase font-bold">Trades</label>
                                <input type="number" id="tradesInput" placeholder="Qty" required class="w-full bg-slate-700 border-none rounded-lg p-3 text-white">
                            </div>
                        </div>
                        <div>
                            <label class="block text-[10px] mb-2 text-slate-400 uppercase font-bold">Journal Notes</label>
                            <textarea id="noteInput" placeholder="Confidence, why you took the trade..." class="w-full bg-slate-700 border-none rounded-lg p-3 text-sm h-32 text-white resize-none"></textarea>
                        </div>
                        <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-xl transition-all uppercase tracking-widest shadow-lg shadow-blue-900/40">Save To Calendar</button>
                    </form>
                </div>
                <button onclick="resetData()" class="w-full text-[10px] text-slate-600 hover:text-red-400 transition-colors uppercase font-black tracking-widest text-center">⚠️ Clear Monthly Data</button>
            </div>

            <div class="xl:col-span-4">
                <div class="grid grid-cols-7 gap-3 mb-4 text-center text-slate-500 font-black text-xs uppercase tracking-widest">
                    <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
                </div>
                <div id="calendarGrid" class="grid grid-cols-7 gap-3">
                    </div>
            </div>
        </div>
    </div>

    <script>
        let tradeData = JSON.parse(localStorage.getItem('tradingDataV3')) || {};

        function renderCalendar() {
            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = '';
            
            const now = new Date();
            const year = now.getFullYear();
            const month = now.getMonth();
            const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
            
            document.getElementById('monthTitle').innerText = `${monthNames[month]} ${year}`;
            
            const firstDayIndex = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            let monthlyTotal = 0, totalTradesCount = 0, winningDays = 0, loggedDays = 0;

            for (let i = 0; i < firstDayIndex; i++) {
                grid.innerHTML += `<div class="bg-slate-800/10 rounded-xl p-2 border border-transparent"></div>`;
            }

            for (let day = 1; day <= daysInMonth; day++) {
                const dateKey = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const data = tradeData[dateKey];
                let bgColor = 'bg-slate-800/40', content = '';

                if (data) {
                    const pnl = parseFloat(data.pnl);
                    monthlyTotal += pnl;
                    totalTradesCount += parseInt(data.trades);
                    loggedDays++;
                    if (pnl > 0) { bgColor = 'bg-profit'; winningDays++; }
                    else if (pnl < 0) bgColor = 'bg-loss';
                    else bgColor = 'bg-breakeven';

                    content = `
                        <div class="text-lg md:text-xl font-black font-mono mt-2">${pnl >= 0 ? '+' : ''}${pnl}</div>
                        <div class="text-[10px] md:text-xs opacity-90 mt-1 leading-tight italic truncate w-full text-center px-2">${data.note || ''}</div>
                        <div class="mt-auto mb-1 text-[10px] font-black opacity-60">${data.trades} TRADES</div>
                        <div class="details-pop">
                            <p class="text-blue-400 font-black border-b border-slate-700 mb-2 pb-1 uppercase tracking-tighter">Day ${day}</p>
                            <p class="italic text-slate-200">"${data.note || 'No notes for this session'}"</p>
                            <p class="mt-2 text-[10px] text-slate-400 uppercase">${data.trades} Trades Taken</p>
                        </div>
                    `;
                }

                grid.innerHTML += `
                    <div class="day-card ${bgColor} p-3 rounded-xl flex flex-col items-center shadow-sm" tabindex="0">
                        <span class="text-xs self-start opacity-30 font-black">${day}</span>
                        ${content}
                    </div>
                `;
            }

            const winRateCalc = loggedDays > 0 ? ((winningDays / loggedDays) * 100).toFixed(1) : 0;
            document.getElementById('totalPNL').innerText = `$${monthlyTotal.toFixed(2)}`;
            document.getElementById('totalPNL').className = `text-4xl font-mono ${monthlyTotal >= 0 ? 'text-green-400' : 'text-red-400'}`;
            document.getElementById('totalTrades').innerText = totalTradesCount;
            document.getElementById('winRate').innerText = `${winRateCalc}%`;
        }

        document.getElementById('tradeForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const date = document.getElementById('dateInput').value;
            tradeData[date] = { 
                pnl: document.getElementById('pnlInput').value, 
                trades: document.getElementById('tradesInput').value,
                note: document.getElementById('noteInput').value 
            };
            localStorage.setItem('tradingDataV3', JSON.stringify(tradeData));
            renderCalendar();
            e.target.reset();
        });

        function resetData() {
            if(confirm("Wipe all data?")) {
                localStorage.removeItem('tradingDataV3');
                tradeData = {};
                renderCalendar();
            }
        }
        renderCalendar();
    </script>
</body>
</html>
