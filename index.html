<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Journal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Essential for pop-ups: relative lets notes attach to the box, visible lets them pop out */
        .day-card { min-height: 110px; transition: transform 0.2s; border: 1px solid #334155; position: relative; overflow: visible !important; }
        .bg-profit { background-color: #22c55e !important; color: white; }
        .bg-loss { background-color: #ef4444 !important; color: white; }
        .bg-breakeven { background-color: #eab308 !important; color: white; }

        /* Pop-up Styling */
        .details-pop {
            display: none; position: absolute; z-index: 100; bottom: 105%; left: 50%;
            transform: translateX(-50%); width: 180px; padding: 10px;
            background: #0f172a; border: 2px solid #3b82f6; border-radius: 8px;
            font-size: 11px; color: white; text-align: center; pointer-events: none;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        .day-card:hover .details-pop, .day-card:active .details-pop { display: block; }
    </style>
</head>
<body class="bg-slate-900 text-white font-sans p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 border-b border-slate-700 pb-6">
            <div class="mb-4 md:mb-0">
                <h1 id="monthTitle" class="text-4xl font-black text-blue-400 uppercase tracking-tighter italic">MONTH</h1>
                <p class="text-slate-400 text-sm">Trading Performance Tracker</p>
            </div>
            <div class="flex gap-4 md:gap-8 text-right">
                <div><p class="text-[10px] text-slate-400 uppercase font-bold">Win Rate</p><p id="winRate" class="text-2xl font-mono text-yellow-400">0%</p></div>
                <div><p class="text-[10px] text-slate-400 uppercase font-bold">Total Trades</p><p id="totalTrades" class="text-2xl font-mono text-blue-400">0</p></div>
                <div><p class="text-[10px] text-slate-400 uppercase font-bold">Net PNL</p><p id="totalPNL" class="text-2xl font-mono text-green-400">$0.00</p></div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
            <div class="flex flex-col gap-4">
                <div class="bg-slate-800 p-6 rounded-xl shadow-xl border border-slate-700">
                    <h2 class="text-xl font-semibold mb-4 text-blue-300 uppercase italic">Log Session</h2>
                    <form id="tradeForm" class="space-y-4">
                        <div>
                            <label class="block text-xs mb-1 text-slate-400 uppercase">Date</label>
                            <input type="date" id="dateInput" required class="w-full bg-slate-700 border-none rounded p-2 focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div class="grid grid-cols-2 gap-2">
                            <div>
                                <label class="block text-xs mb-1 text-slate-400 uppercase">PNL ($)</label>
                                <input type="number" id="pnlInput" placeholder="0.00" step="0.01" required class="w-full bg-slate-700 border-none rounded p-2">
                            </div>
                            <div>
                                <label class="block text-xs mb-1 text-slate-400 uppercase">Trades</label>
                                <input type="number" id="tradesInput" placeholder="Qty" required class="w-full bg-slate-700 border-none rounded p-2">
                            </div>
                        </div>
                        <div>
                            <label class="block text-xs mb-1 text-slate-400 uppercase">Journal Notes</label>
                            <textarea id="noteInput" placeholder="e.g. Confidence, why you took the trade..." class="w-full bg-slate-700 border-none rounded p-2 text-sm h-20"></textarea>
                        </div>
                        <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-2 rounded transition uppercase tracking-widest">Save To Calendar</button>
                    </form>
                </div>
                <button onclick="resetData()" class="text-[10px] text-slate-500 hover:text-red-400 transition-colors uppercase font-bold tracking-widest text-center">⚠️ Clear Data</button>
            </div>

            <div class="lg:col-span-3">
                <div class="grid grid-cols-7 gap-2 mb-2 text-center text-slate-500 font-bold text-xs uppercase tracking-widest">
                    <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
                </div>
                <div id="calendarGrid" class="grid grid-cols-7 gap-2"></div>
            </div>
        </div>
    </div>

    <script>
        // Using 'tradingDataV3' to keep it consistent with your stable version
        let tradeData = JSON.parse(localStorage.getItem('tradingDataV3')) || {};

        function renderCalendar() {
            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = '';
            
            const now = new Date();
            const year = now.getFullYear();
            const month = now.getMonth();
            const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
            
            document.getElementById('monthTitle').innerText = `${monthNames[month]} ${year}`;
            
            const firstDayIndex = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            let monthlyTotal = 0, totalTradesCount = 0, winningDays = 0, loggedDays = 0;

            // Empty days
            for (let i = 0; i < firstDayIndex; i++) {
                grid.innerHTML += `<div class="bg-slate-800/20 rounded-lg p-2 border border-transparent"></div>`;
            }

            // Actual days
            for (let day = 1; day <= daysInMonth; day++) {
                const dateKey = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const data = tradeData[dateKey];
                let bgColor = 'bg-slate-800/40', content = '';

                if (data) {
                    const pnl = parseFloat(data.pnl);
                    monthlyTotal += pnl;
                    totalTradesCount += parseInt(data.trades);
                    loggedDays++;
                    if (pnl > 0) { bgColor = 'bg-profit'; winningDays++; }
                    else if (pnl < 0) bgColor = 'bg-loss';
                    else bgColor = 'bg-breakeven';

                    content = `
                        <div class="text-sm font-bold font-mono mt-1">${pnl >= 0 ? '+' : ''}${pnl}</div>
                        <div class="text-[9px] opacity-90 leading-tight italic truncate w-full text-center px-1">${data.note || ''}</div>
                        <div class="mt-auto text-[10px] font-black opacity-60">${data.trades} TRADES</div>
                        <div class="details-pop">
                            <p class="text-blue-400 font-bold border-b border-slate-700 mb-1 pb-1">Day ${day}</p>
                            <p class="italic">"${data.note || 'No notes'}"</p>
                        </div>
                    `;
                }

                grid.innerHTML += `
                    <div class="day-card ${bgColor} p-1 rounded-lg flex flex-col items-center" tabindex="0">
                        <span class="text-[10px] self-start opacity-40 font-bold">${day}</span>
                        ${content}
                    </div>
                `;
            }

            const winRateCalc = loggedDays > 0 ? ((winningDays / loggedDays) * 100).toFixed(1) : 0;
            document.getElementById('totalPNL').innerText = `$${monthlyTotal.toFixed(2)}`;
            document.getElementById('totalPNL').className = `text-2xl font-mono ${monthlyTotal >= 0 ? 'text-green-400' : 'text-red-400'}`;
            document.getElementById('totalTrades').innerText = totalTradesCount;
            document.getElementById('winRate').innerText = `${winRateCalc}%`;
        }

        document.getElementById('tradeForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const date = document.getElementById('dateInput').value;
            tradeData[date] = { 
                pnl: document.getElementById('pnlInput').value, 
                trades: document.getElementById('tradesInput').value,
                note: document.getElementById('noteInput').value 
            };
            localStorage.setItem('tradingDataV3', JSON.stringify(tradeData));
            renderCalendar();
            e.target.reset();
        });

        function resetData() {
            if(confirm("Wipe all data?")) {
                localStorage.removeItem('tradingDataV3');
                tradeData = {};
                renderCalendar();
            }
        }
        renderCalendar();
    </script>
</body>
</html>
